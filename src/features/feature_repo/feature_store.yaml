project: smartreco
registry: data/registry.db
provider: local

offline_store:
    type: postgres
    host: ${POSTGRES_HOST}
    port: ${POSTGRES_PORT}
    database: ${POSTGRES_DB}
    db_schema: analytics
    user: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}

online_store:
    type: redis
    connection_string: "${REDIS_HOST}:${REDIS_PORT}"

entity_key_serialization_version: 3
auth:
    type: no_auth