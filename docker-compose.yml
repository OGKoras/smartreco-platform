services:
  postgres_db:
    image: postgres:15
    container_name: smartreco_postgres
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
  redis:
    image: redis:7-alpine
    container_name: smartreco-redis
    ports:
      - "6379:6379"
    restart: always
volumes:
  postgres_data: